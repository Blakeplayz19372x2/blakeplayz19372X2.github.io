<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted Webpage</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f5;
            color: #333;
        }

        .container {
            text-align: center;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            max-width: 350px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #444;
        }

        h2 {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #666;
        }

        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4caf50;
            color: white;
            font-size: 1em;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
    <script>
        function xorEncryptDecrypt(input, key) {
            let output = '';
            for (let i = 0; i < input.length; i++) {
                output += String.fromCharCode(
                    input.charCodeAt(i) ^ key.charCodeAt(i % key.length)
                );
            }
            return output;
        }

        function checkPassword() {
            const inputPassword = document.getElementById('password').value.trim();

            if (!inputPassword) {
                alert("Password cannot be empty.");
                return;
            }

            // XOR-encrypted version of "testpassword" using key "mykey"
            const encryptedPassword = "\u0018\u0010\u0007\u001f7\u0016\u0006\u0017\u0017\u001c\b";
            const key = "mykey";

            const decryptedPassword = xorEncryptDecrypt(encryptedPassword, key);

            if (inputPassword === decryptedPassword) {
                alert("Access granted!");
                window.location.href = "pages/games/catalog.html";
            } else {
                alert("Incorrect Password. Please try again.");
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Access Restricted</h1>
        <h2>Please enter the access key to proceed.</h2>
        <form onsubmit="event.preventDefault(); checkPassword();">
            <input type="password" id="password" placeholder="Enter Password" required>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
