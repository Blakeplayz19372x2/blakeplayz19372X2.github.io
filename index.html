<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restricted Webpage</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f0f5;
      color: #333;
    }

    .container {
      text-align: center;
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      max-width: 350px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
  </style>
  <script>
    let actualPassword = '';

    function generateRandomKey(length = 16) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      let result = '';
      for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    function reverseString(str) {
      return str.split('').reverse().join('');
    }

    function setCookie(name, value, days) {
      const date = new Date();
      date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
      document.cookie = `${name}=${value}; expires=${date.toUTCString()}; path=/`;
    }

    function getCookie(name) {
      const cookies = document.cookie.split('; ');
      for (let cookie of cookies) {
        let [key, value] = cookie.split('=');
        if (key === name) return value;
      }
      return null;
    }

    function setupPassword() {
      actualPassword = generateRandomKey();
      const reversedFake = reverseString(actualPassword);
      console.log(`🔑 Password: ${reversedFake}`);

      // Check if user is already logged in
      if (getCookie("loggedIn") === "true") {
        alert("Welcome back! You are automatically logged in.");
        window.location.href = "pages/games/catalog.html";
      }
    }

    function checkPassword() {
      const inputPassword = document.getElementById('password').value.trim();

      if (!inputPassword) {
        alert("Password cannot be empty.");
        return;
      }

      if (inputPassword === actualPassword) {
        setCookie("loggedIn", "true", 1); // Store login cookie for 24 hours
        alert("Access granted!");
        window.location.href = "pages/games/catalog.html";
      } else {
        alert("Incorrect Password. Hint: Look at the passkey in the console and reverse it!");
      }
    }

    window.onload = setupPassword;
  </script>
</head>
<body>
  <div class="container">
    <h1>Access Restricted</h1>
    <h2>Please enter the access key to proceed.</h2>
    <form onsubmit="event.preventDefault(); checkPassword();">
      <input type="password" id="password" placeholder="Enter Password" required />
      <button type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
