<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restricted Webpage</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f0f5;
      color: #333;
    }

    .container {
      text-align: center;
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      max-width: 350px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 2em;
      margin-bottom: 10px;
      color: #444;
    }

    h2 {
      font-size: 1.2em;
      margin-bottom: 20px;
      color: #666;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1em;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background-color: #4caf50;
      color: white;
      font-size: 1em;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
  <script>
    let actualPassword = '';

    function generateRandomKey(length = 16) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      let result = '';
      for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    function reverseString(str) {
      return str.split('').reverse().join('');
    }

    function setupPassword() {
      actualPassword = generateRandomKey();
      const reversedFake = reverseString(actualPassword);
      console.log(`🔑 Password: ${reversedFake}`);
    }

    function checkPassword() {
      const inputPassword = document.getElementById('password').value.trim();

      if (!inputPassword) {
        alert("Password cannot be empty.");
        return;
      }

      if (inputPassword === actualPassword) {
        alert("Access granted!");
        window.location.href = "pages/games/catalog.html";
      } else {
        alert("Incorrect Password. Hint: Look at the passkey in the console and reverse it! e.g. 123 -> 321");
      }
    }

    window.onload = setupPassword;
  </script>
</head>
<body>
  <div class="container">
    <h1>Access Restricted</h1>
    <h2>Please enter the access key to proceed.</h2>
    <form onsubmit="event.preventDefault(); checkPassword();">
      <input type="password" id="password" placeholder="Enter Password" required />
      <button type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
