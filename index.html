<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Historical Archives</title>
  <style>
    body {
      font-family: 'Times New Roman', serif;
      background-color: #f5f5f5;
      color: #333;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-size: 2em;
      color: #444;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      font-size: 1em;
    }
  </style>
  <script>
    function setCookie(name, value, days) {
      const date = new Date();
      date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
      document.cookie = `${name}=${value}; expires=${date.toUTCString()}; path=/`;
    }

    function getCookie(name) {
      const cookies = document.cookie.split('; ');
      for (let cookie of cookies) {
        let [key, value] = cookie.split('=');
        if (key === name) return value;
      }
      return null;
    }

    function setupLogin() {
      if (getCookie("loggedIn") === "true") {
        alert("Welcome back! You are automatically logged in.");
        window.location.href = "pages/games/catalog.html";
      }
    }

    function checkAccess(event) {
      // Check if Enter is pressed and input is focused
      if (event.key === "Enter" && document.activeElement.id === "access") {
        const input = document.getElementById("access").value.trim().toLowerCase();
        if (input === "i want games") {
          setCookie("loggedIn", "true", 1); // Store login cookie for 24 hours
          window.location.href = "pages/games/catalog.html";
        } else {
          // Redirect to fake search results page for invalid queries
          window.location.href = "pages/search-results.html?query=" + encodeURIComponent(input);
        }
      }
    }

    window.onload = setupLogin;
  </script>
</head>
<body onkeypress="checkAccess(event)">
  <div class="container">
    <h1>Historical Archives Database</h1>
    <p>Welcome to the Historical Archives Database. Use the search bar below to browse records:</p>
    <input type="text" id="access" placeholder="Search historical records..."/>
  </div>
</body>
</html>
