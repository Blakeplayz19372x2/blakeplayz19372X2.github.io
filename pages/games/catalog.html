<html>
  <head>
    <title>See our catalog</title>
    <style>
      body {
        background-color: gray;
        font-family: monospace;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      h1 {
        text-align: center;
        color: white;
        margin-top: 25px;
        text-shadow: 0 0 5px gold, 0 0 10px orange, 0 0 20px yellow;
        animation: glow 3s ease-in-out infinite alternate;
      }

      .container {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        justify-content: center;
        margin-top: 50px;
        padding: 0 10px;
      }

      a {
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        width: 100px;
        height: 100px;
        text-align: center;
        border: 2px solid gold;
        background-color: black;
        border-radius: 15px;
        color: white;
        font-size: 1.2rem;
        box-sizing: border-box;
        overflow: hidden;
        position: relative;
        z-index: 0;
        box-shadow: 0 0 10px gold;
        text-shadow: 0 0 5px gold, 0 0 10px orange, 0 0 15px yellow;
        transition: transform 0.3s ease, text-shadow 0.3s ease;
        animation: glow 3s ease-in-out infinite alternate;
      }

      a::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 15px;
        background-color: gold;
        opacity: 0.15;
        filter: blur(10px);
        z-index: -1;
        transition: opacity 0.3s;
      }

      a:hover {
        transform: scale(1.25);
      }

      a:hover::before {
        opacity: 0.35;
      }

      a img {
        width: 75px;
        height: 75px;
        object-fit: cover;
      }

      a span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: normal;
        max-height: 25px;
      }

      @keyframes glow {
        0% {
          text-shadow: 0 0 5px gold, 0 0 10px orange, 0 0 15px yellow;
          box-shadow: 0 0 10px gold;
        }
        100% {
          text-shadow: 0 0 10px gold, 0 0 20px orange, 0 0 30px yellow;
          box-shadow: 0 0 20px gold;
        }
      }
    </style>
  </head>
