    <title>See our catalog</title>
    <style>
      body {
        background-color: gray;
        font-family: monospace;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      h1 {
        text-align: center;
        color: white;
        margin-top: 25px;
        text-shadow: 0 0 5px green, 0 0 10px lime, 0 0 20px green;
        animation: glow 3s ease-in-out infinite alternate;
      }

      .container {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        justify-content: center;
        margin-top: 50px;
        padding: 0 10px;
      }

      a {
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        width: 100px;
        height: 100px;
        text-align: center;
        border: 2px solid lime;
        background-color: black;
        border-radius: 15px;
        color: white;
        font-size: 1.2rem;
        box-sizing: border-box;
        overflow: hidden;
        position: relative;
        z-index: 0;
        box-shadow: 0 0 10px lime;
        text-shadow: 0 0 5px green, 0 0 10px lime, 0 0 15px green;
        transition: transform 0.3s ease, text-shadow 0.3s ease;
        animation: glow 3s ease-in-out infinite alternate;
      }

      a::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 15px;
        background-color: greenyellow;
        opacity: 0.15;
        filter: blur(10px);
        z-index: -1;
        transition: opacity 0.3s;
      }

      a:hover {
        transform: scale(1.125);
      }

      a:hover::before {
        opacity: 0.35;
      }

      a img {
        width: 75px;
        height: 75px;
        object-fit: cover;
      }

      a span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: normal;
        max-height: 25px;
      }

      @keyframes glow {
        0% {
          text-shadow: 0 0 5px green, 0 0 10px lime, 0 0 15px green;
          box-shadow: 0 0 10px lime;
        }
        100% {
          text-shadow: 0 0 10px green, 0 0 20px lime, 0 0 30px green;
          box-shadow: 0 0 20px lime;
        }
      }
    </style>
